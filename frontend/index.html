<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #21262d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --red:      #f85149;
    --green-bg: #1a2f1a;
    --red-bg:   #2f1a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #topbar .logo {
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-right: 8px;
  }

  .btn-group {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 6px;
    padding: 2px;
  }

  .btn-group button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .btn-group button:hover    { color: var(--text); background: var(--border); }
  .btn-group button.active   { color: var(--text); background: var(--border); font-weight: 600; }

  #price-display {
    margin-left: auto;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  #price-display .price {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  #price-display .change {
    font-size: 13px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .change.up   { color: var(--green); background: var(--green-bg); }
  .change.down { color: var(--red);   background: var(--red-bg);   }

  /* ── Main layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Chart area ── */
  #chart-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chart-container {
    flex: 1;
    position: relative;
  }

  /* ── Volume sub-chart ── */
  #volume-container {
    height: 100px;
    flex-shrink: 0;
    position: relative;
    border-top: 1px solid var(--border);
  }

  /* ── OHLCV tooltip ── */
  #tooltip {
    position: absolute;
    top: 10px;
    left: 12px;
    z-index: 10;
    font-size: 12px;
    color: var(--muted);
    pointer-events: none;
    line-height: 1.6;
  }

  #tooltip .ohlc { display: flex; gap: 16px; }
  #tooltip .lbl  { color: var(--muted); }
  #tooltip .val  { color: var(--text); font-variant-numeric: tabular-nums; }
  #tooltip .o { color: #c8d1da; }
  #tooltip .h { color: var(--green); }
  #tooltip .l { color: var(--red); }
  #tooltip .c { color: var(--accent); font-weight: 600; }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #sidebar h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .price-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .price-card:hover       { border-color: var(--accent); }
  .price-card.active      { border-color: var(--accent); background: #1a2234; }
  .price-card .sym        { font-weight: 700; font-size: 12px; color: var(--text); }
  .price-card .prc        { font-size: 15px; font-weight: 600; color: var(--text);
                            font-variant-numeric: tabular-nums; margin-top: 2px; }
  .price-card .prc.up     { color: var(--green); }
  .price-card .prc.down   { color: var(--red); }

  /* ── Stats panel ── */
  .stats { display: flex; flex-direction: column; gap: 6px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; }
  .stat-row .stat-lbl { color: var(--muted); font-size: 11px; }
  .stat-row .stat-val { color: var(--text);  font-size: 12px; font-variant-numeric: tabular-nums; }

  /* ── Status bar ── */
  #statusbar {
    padding: 4px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
    display: flex;
    gap: 20px;
  }

  #statusbar span { display: flex; gap: 4px; }
  #statusbar .ok  { color: var(--green); }

  /* loading */
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    color: var(--muted);
    font-size: 14px;
    z-index: 20;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="logo">⬡ TradingBot</span>

  <div class="btn-group" id="symbol-btns">
    <button data-sym="BTC-PERP" class="active">BTC</button>
    <button data-sym="SOL-PERP">SOL</button>
    <button data-sym="BTCSOL">BTC/SOL</button>
  </div>

  <div class="btn-group" id="interval-btns">
    <button data-iv="1d" class="active">1D</button>
    <button data-iv="4h">4H</button>
    <button data-iv="1h">1H</button>
  </div>

  <div id="price-display">
    <span class="price" id="cur-price">—</span>
    <span class="change" id="cur-change"></span>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Chart + volume -->
  <div id="chart-wrap">
    <div id="chart-container">
      <div id="loading">Loading data…</div>
      <div id="tooltip"></div>
    </div>
    <div id="volume-container"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div>
      <h3>Markets</h3>
      <div id="market-cards"></div>
    </div>
    <div>
      <h3>Stats</h3>
      <div class="stats" id="stats-panel">
        <div class="stat-row"><span class="stat-lbl">Open</span><span class="stat-val" id="s-open">—</span></div>
        <div class="stat-row"><span class="stat-lbl">High</span><span class="stat-val" id="s-high">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Low</span><span class="stat-val" id="s-low">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Close</span><span class="stat-val" id="s-close">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Volume</span><span class="stat-val" id="s-vol">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Change</span><span class="stat-val" id="s-chg">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Candles</span><span class="stat-val" id="s-cnt">—</span></div>
      </div>
    </div>
  </div>

</div>

<!-- Status bar -->
<div id="statusbar">
  <span><span class="ok">●</span>&nbsp;Connected</span>
  <span id="sb-symbol">—</span>
  <span id="sb-range">—</span>
  <span id="sb-updated">—</span>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let state = { symbol: 'BTC-PERP', interval: '1d', candles: [] };
let mainChart, candleSeries, volChart, volSeries;

// ── Format helpers ─────────────────────────────────────────────────────────
function fmt(n, decimals = 2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}

function fmtPrice(n, sym) {
  if (sym === 'BTCSOL') return fmt(n, 2);
  if (sym === 'SOL-PERP') return fmt(n, 3);
  return fmt(n, 2);
}

function fmtVol(n) {
  if (!n) return '—';
  if (n >= 1e9) return fmt(n / 1e9, 2) + 'B';
  if (n >= 1e6) return fmt(n / 1e6, 2) + 'M';
  if (n >= 1e3) return fmt(n / 1e3, 2) + 'K';
  return fmt(n, 4);
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('en-US',
    { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

// ── Chart init ─────────────────────────────────────────────────────────────
function initCharts() {
  const chartEl  = document.getElementById('chart-container');
  const volEl    = document.getElementById('volume-container');

  const sharedOpts = {
    layout:     { background: { color: '#0d1117' }, textColor: '#8b949e' },
    grid:       { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair:  { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale:  { borderColor: '#21262d', timeVisible: true, secondsVisible: false,
                  fixLeftEdge: true, fixRightEdge: false },
    rightPriceScale: { borderColor: '#21262d', scaleMargins: { top: 0.05, bottom: 0.05 } },
    handleScroll: true,
    handleScale:  true,
  };

  mainChart = LightweightCharts.createChart(chartEl, {
    ...sharedOpts,
    width:  chartEl.clientWidth,
    height: chartEl.clientHeight,
  });

  candleSeries = mainChart.addCandlestickSeries({
    upColor:        '#3fb950',
    downColor:      '#f85149',
    borderUpColor:  '#3fb950',
    borderDownColor:'#f85149',
    wickUpColor:    '#3fb950',
    wickDownColor:  '#f85149',
  });

  // Volume chart (separate small chart, synced time scale)
  volChart = LightweightCharts.createChart(volEl, {
    ...sharedOpts,
    width:  volEl.clientWidth,
    height: volEl.clientHeight,
    timeScale: { ...sharedOpts.timeScale, visible: false },
    rightPriceScale: { borderColor: '#21262d', scaleMargins: { top: 0.1, bottom: 0 } },
  });

  volSeries = volChart.addHistogramSeries({
    color: '#58a6ff44',
    priceFormat: { type: 'volume' },
  });

  // Sync crosshair & scroll between charts
  mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) volChart.timeScale().setVisibleLogicalRange(range);
  });
  volChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) mainChart.timeScale().setVisibleLogicalRange(range);
  });

  // Crosshair sync
  mainChart.subscribeCrosshairMove(p => {
    if (p.time) volChart.setCrosshairPosition(p.seriesData.get(candleSeries)?.close ?? 0, p.time, volSeries);
    onCrosshair(p);
  });

  // Resize observer
  const ro = new ResizeObserver(() => {
    mainChart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight });
    volChart.applyOptions({ width: volEl.clientWidth, height: volEl.clientHeight });
  });
  ro.observe(chartEl);
  ro.observe(volEl);
}

// ── Crosshair tooltip ─────────────────────────────────────────────────────
function onCrosshair(p) {
  const tip = document.getElementById('tooltip');
  const bar = p.seriesData?.get(candleSeries);
  if (!bar) { tip.innerHTML = ''; return; }

  const isUp = bar.close >= bar.open;
  const chg  = ((bar.close - bar.open) / bar.open * 100).toFixed(2);
  const sign = isUp ? '+' : '';
  const col  = isUp ? '#3fb950' : '#f85149';
  const dp   = state.symbol === 'SOL-PERP' ? 3 : 2;

  tip.innerHTML = `
    <div class="ohlc">
      <span><span class="lbl">O </span><span class="o">${fmt(bar.open, dp)}</span></span>
      <span><span class="lbl">H </span><span class="h">${fmt(bar.high, dp)}</span></span>
      <span><span class="lbl">L </span><span class="l">${fmt(bar.low, dp)}</span></span>
      <span><span class="lbl">C </span><span style="color:${col};font-weight:600">${fmt(bar.close, dp)}</span></span>
      <span style="color:${col}">${sign}${chg}%</span>
    </div>`;

  // Update sidebar stats
  document.getElementById('s-open').textContent  = fmt(bar.open, dp);
  document.getElementById('s-high').textContent  = fmt(bar.high, dp);
  document.getElementById('s-low').textContent   = fmt(bar.low, dp);
  document.getElementById('s-close').textContent = fmt(bar.close, dp);
  document.getElementById('s-chg').textContent   = `${sign}${chg}%`;
  document.getElementById('s-chg').style.color   = col;
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadKlines(symbol, interval) {
  document.getElementById('loading').style.display = 'flex';
  try {
    const res  = await fetch(`/api/klines?symbol=${symbol}&interval=${interval}&limit=500`);
    const data = await res.json();
    return data.candles || [];
  } catch (e) {
    console.error(e);
    return [];
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

async function render() {
  const { symbol, interval } = state;
  const candles = await loadKlines(symbol, interval);
  if (!candles.length) return;
  state.candles = candles;

  // Feed to chart
  candleSeries.setData(candles);
  volSeries.setData(candles.map(c => ({
    time:  c.time,
    value: c.volume,
    color: c.close >= c.open ? '#3fb95055' : '#f8514955',
  })));

  mainChart.timeScale().fitContent();
  volChart.timeScale().fitContent();

  // Price display (last candle)
  const last  = candles[candles.length - 1];
  const first = candles[0];
  const dp    = symbol === 'SOL-PERP' ? 3 : 2;
  const chg   = ((last.close - first.close) / first.close * 100).toFixed(2);
  const isUp  = parseFloat(chg) >= 0;

  document.getElementById('cur-price').textContent  = fmtPrice(last.close, symbol);
  const chgEl = document.getElementById('cur-change');
  chgEl.textContent  = `${isUp ? '+' : ''}${chg}%`;
  chgEl.className    = 'change ' + (isUp ? 'up' : 'down');

  // Sidebar stats (last candle)
  document.getElementById('s-open').textContent  = fmt(last.open, dp);
  document.getElementById('s-high').textContent  = fmt(last.high, dp);
  document.getElementById('s-low').textContent   = fmt(last.low, dp);
  document.getElementById('s-close').textContent = fmt(last.close, dp);
  document.getElementById('s-vol').textContent   = fmtVol(last.volume);
  document.getElementById('s-cnt').textContent   = candles.length;
  const lastChg = ((last.close - last.open) / last.open * 100).toFixed(2);
  document.getElementById('s-chg').textContent   = `${lastChg >= 0 ? '+' : ''}${lastChg}%`;
  document.getElementById('s-chg').style.color   = lastChg >= 0 ? '#3fb950' : '#f85149';

  // Status bar
  document.getElementById('sb-symbol').textContent = `${symbol} / ${interval}`;
  document.getElementById('sb-range').textContent  =
    `${fmtDate(first.time)} – ${fmtDate(last.time)}`;
  document.getElementById('sb-updated').textContent =
    `Updated ${new Date().toLocaleTimeString()}`;
}

// ── Market cards sidebar ───────────────────────────────────────────────────
async function loadMarketCards() {
  try {
    const res  = await fetch('/api/latest');
    const data = await res.json();

    // Deduplicate: prefer 1d
    const seen = {};
    for (const p of data.prices) {
      if (!seen[p.symbol] || p.interval === '1d') seen[p.symbol] = p;
    }

    const container = document.getElementById('market-cards');
    container.innerHTML = '';

    for (const sym of ['BTC-PERP', 'SOL-PERP', 'BTCSOL']) {
      const p = seen[sym];
      if (!p) continue;
      const dp   = sym === 'SOL-PERP' ? 3 : 2;
      const card = document.createElement('div');
      card.className = 'price-card' + (sym === state.symbol ? ' active' : '');
      card.dataset.sym = sym;
      card.innerHTML = `
        <div class="sym">${sym.replace('-PERP', '')}</div>
        <div class="prc">${fmtPrice(p.close, sym)}</div>`;
      card.addEventListener('click', () => {
        state.symbol = sym;
        document.querySelectorAll('#symbol-btns button').forEach(b =>
          b.classList.toggle('active', b.dataset.sym === sym));
        document.querySelectorAll('.price-card').forEach(c =>
          c.classList.toggle('active', c.dataset.sym === sym));
        render();
      });
      container.appendChild(card);
    }
  } catch(e) { console.error(e); }
}

// ── Button wiring ─────────────────────────────────────────────────────────
document.querySelectorAll('#symbol-btns button').forEach(btn => {
  btn.addEventListener('click', () => {
    state.symbol = btn.dataset.sym;
    document.querySelectorAll('#symbol-btns button').forEach(b =>
      b.classList.toggle('active', b === btn));
    document.querySelectorAll('.price-card').forEach(c =>
      c.classList.toggle('active', c.dataset.sym === state.symbol));
    render();
  });
});

document.querySelectorAll('#interval-btns button').forEach(btn => {
  btn.addEventListener('click', () => {
    state.interval = btn.dataset.iv;
    document.querySelectorAll('#interval-btns button').forEach(b =>
      b.classList.toggle('active', b === btn));
    render();
  });
});

// ── Boot ──────────────────────────────────────────────────────────────────
initCharts();
loadMarketCards();
render();

// Auto-refresh every 60s
setInterval(() => { render(); loadMarketCards(); }, 60_000);
</script>
</body>
</html>
