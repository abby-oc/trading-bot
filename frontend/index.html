<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0d1117; --surface: #161b22; --border: #21262d;
    --text:    #e6edf3; --muted:   #8b949e; --accent: #58a6ff;
    --green:   #3fb950; --red:     #f85149;
    --green-bg:#1a2f1a; --red-bg:  #2f1a1a;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;
         font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* top bar */
  #topbar { display:flex; align-items:center; gap:12px; padding:8px 14px;
            background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .logo { font-weight:700; font-size:15px; color:var(--accent); margin-right:4px; }
  .btn-group { display:flex; gap:2px; background:var(--bg); border-radius:6px; padding:2px; }
  .btn-group button { background:none; border:none; color:var(--muted); padding:4px 10px;
                      border-radius:4px; cursor:pointer; font-size:12px; transition:all .15s; }
  .btn-group button:hover  { color:var(--text); background:var(--border); }
  .btn-group button.active { color:var(--text); background:var(--border); font-weight:600; }
  #price-display { margin-left:auto; display:flex; align-items:baseline; gap:8px; }
  #price-display .price { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; }
  .change { font-size:12px; font-weight:600; padding:2px 6px; border-radius:4px; }
  .change.up   { color:var(--green); background:var(--green-bg); }
  .change.down { color:var(--red);   background:var(--red-bg);   }

  /* main layout */
  #main { display:flex; flex:1; overflow:hidden; }
  #chart-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #chart-container { flex:1; position:relative; }
  #volume-container { height:80px; flex-shrink:0; position:relative; border-top:1px solid var(--border); }
  #indicator-container { height:90px; flex-shrink:0; position:relative; border-top:1px solid var(--border); }

  /* tooltip */
  #tooltip { position:absolute; top:8px; left:10px; z-index:10; font-size:11px;
             color:var(--muted); pointer-events:none; line-height:1.7; }
  #tooltip .ohlc { display:flex; gap:14px; }

  /* sidebar */
  #sidebar { width:210px; flex-shrink:0; background:var(--surface); border-left:1px solid var(--border);
             padding:10px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
  #sidebar h3 { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase;
                letter-spacing:.8px; margin-bottom:5px; }
  .price-card { background:var(--bg); border:1px solid var(--border); border-radius:6px;
                padding:7px 9px; cursor:pointer; transition:border-color .15s; margin-bottom:5px; }
  .price-card:hover     { border-color:var(--accent); }
  .price-card.active    { border-color:var(--accent); background:#1a2234; }
  .price-card .sym      { font-weight:700; font-size:11px; color:var(--text); }
  .price-card .prc      { font-size:14px; font-weight:600; font-variant-numeric:tabular-nums; margin-top:1px; }

  /* stats */
  .stats { display:flex; flex-direction:column; gap:5px; }
  .stat-row { display:flex; justify-content:space-between; }
  .stat-lbl { color:var(--muted); font-size:11px; }
  .stat-val { color:var(--text); font-size:11px; font-variant-numeric:tabular-nums; }

  /* signals panel */
  .sig-row { display:flex; flex-direction:column; gap:2px; padding:6px 8px;
             border:1px solid var(--border); border-radius:5px; margin-bottom:4px; }
  .sig-row.LONG  { border-color:#3fb95044; background:#1a2f1a33; }
  .sig-row.SHORT { border-color:#f8514944; background:#2f1a1a33; }
  .sig-row.FLAT  { opacity:.6; }
  .sig-top { display:flex; justify-content:space-between; align-items:center; }
  .sig-name { font-size:10px; color:var(--muted); }
  .sig-dir  { font-size:11px; font-weight:700; }
  .sig-dir.LONG  { color:var(--green); }
  .sig-dir.SHORT { color:var(--red); }
  .sig-dir.FLAT  { color:var(--muted); }
  .sig-bar { height:3px; background:var(--border); border-radius:2px; margin-top:3px; }
  .sig-bar-fill { height:100%; border-radius:2px; background:var(--accent); transition:width .3s; }
  .sig-bar-fill.LONG  { background:var(--green); }
  .sig-bar-fill.SHORT { background:var(--red); }
  .sig-reason { font-size:9px; color:var(--muted); margin-top:2px; white-space:nowrap;
                overflow:hidden; text-overflow:ellipsis; }

  /* backtest panel */
  .bt-metric { display:flex; justify-content:space-between; padding:1px 0; }
  .bt-lbl    { font-size:10px; color:var(--muted); }
  .bt-val    { font-size:10px; font-weight:600; font-variant-numeric:tabular-nums; }
  .bt-val.pos { color:var(--green); } .bt-val.neg { color:var(--red); }
  #bt-btn { width:100%; padding:5px; background:var(--border); border:none; color:var(--text);
            border-radius:4px; cursor:pointer; font-size:11px; margin-bottom:6px; }
  #bt-btn:hover { background:var(--accent); color:#000; }

  /* live indicator */
  .live-dot { display:inline-block; width:6px; height:6px; border-radius:50%;
              background:#f85149; animation:pulse 1.5s infinite; margin-right:3px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .live-dot.active { background:#3fb950; }

  /* scalper panel */
  .scalper-line { font-size:10px; font-family:monospace; color:var(--muted); line-height:1.5;
                  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .scalper-line.trade { color:var(--accent); }
  .scalper-line.win  { color:var(--green); }
  .scalper-line.loss { color:var(--red); }

  /* status bar */
  #statusbar { padding:3px 14px; background:var(--surface); border-top:1px solid var(--border);
               color:var(--muted); font-size:10px; flex-shrink:0; display:flex; gap:18px; }
  #statusbar .ok { color:var(--green); }

  /* loading */
  #loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
             background:var(--bg); color:var(--muted); font-size:13px; z-index:20; }

  /* regime badge */
  .regime-badge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px;
                  font-weight:700; letter-spacing:.5px; margin-bottom:6px; }
  .regime-bar   { height:4px; border-radius:2px; margin-bottom:8px; background:var(--border); }
  .regime-fill  { height:100%; border-radius:2px; transition:width .3s; }

  /* risk metrics */
  .risk-row  { display:flex; justify-content:space-between; padding:1px 0; }
  .risk-lbl  { font-size:10px; color:var(--muted); }
  .risk-val  { font-size:10px; font-weight:600; font-variant-numeric:tabular-nums; }
  .risk-warn { font-size:9px; color:#f0c040; margin-top:4px; line-height:1.4; word-break:break-word; }
  .risk-warn.danger { color:#f85149; }

  /* data coverage note */
  .coverage-note { font-size:9px; color:var(--muted); margin-top:3px;
                   padding:3px 5px; background:var(--bg); border-radius:3px; }

  /* indicator toggle buttons */
  .ind-btn { font-size:10px; padding:2px 7px; background:var(--bg); border:1px solid var(--border);
             color:var(--muted); border-radius:3px; cursor:pointer; }
  .ind-btn.active { color:var(--text); border-color:var(--accent); }

  /* pattern engine panel */
  .pattern-composite { border:1px solid var(--border); border-radius:6px; padding:8px 10px;
                        margin-bottom:8px; }
  .pattern-composite.BUY  { border-color:#3fb95055; background:#1a2f1a22; }
  .pattern-composite.SELL { border-color:#f8514955; background:#2f1a1a22; }
  .pattern-composite.NEUTRAL { opacity:.7; }
  .pcomp-dir  { font-size:13px; font-weight:800; letter-spacing:.5px; }
  .pcomp-dir.BUY  { color:var(--green); }
  .pcomp-dir.SELL { color:var(--red); }
  .pcomp-dir.NEUTRAL { color:var(--muted); }
  .pcomp-meta { font-size:9px; color:var(--muted); margin-top:2px; }
  .pcomp-bar  { height:4px; background:var(--border); border-radius:2px; margin:5px 0 3px; }
  .pcomp-fill { height:100%; border-radius:2px; transition:width .4s; }
  .pcomp-fill.BUY  { background:var(--green); }
  .pcomp-fill.SELL { background:var(--red); }
  .pcomp-fill.NEUTRAL { background:var(--muted); }
  .pcomp-stats { display:flex; gap:8px; }
  .pcomp-stat  { font-size:9px; color:var(--muted); }
  .pcomp-stat span { color:var(--text); font-weight:600; }

  .pattern-row { display:flex; flex-direction:column; gap:2px; padding:5px 7px;
                 border:1px solid var(--border); border-radius:5px; margin-bottom:3px;
                 opacity:.5; transition:opacity .2s; }
  .pattern-row.active         { opacity:1; }
  .pattern-row.active.BUY  { border-color:#3fb95033; background:#1a2f1a22; }
  .pattern-row.active.SELL { border-color:#f8514933; background:#2f1a1a22; }
  .pat-top { display:flex; justify-content:space-between; align-items:center; }
  .pat-name { font-size:10px; color:var(--muted); }
  .pat-name.active { color:var(--text); }
  .pat-right { display:flex; align-items:center; gap:5px; }
  .pat-dir { font-size:10px; font-weight:700; }
  .pat-dir.BUY  { color:var(--green); }
  .pat-dir.SELL { color:var(--red); }
  .pat-dir.NEUTRAL { color:var(--muted); }
  .pat-wr { font-size:9px; color:var(--muted); }
  .pat-bar { height:3px; background:var(--border); border-radius:2px; margin-top:3px; }
  .pat-bar-fill { height:100%; border-radius:2px; transition:width .3s; }
  .pat-bar-fill.BUY  { background:var(--green); }
  .pat-bar-fill.SELL { background:var(--red); }
  .pat-bar-fill.NEUTRAL { background:var(--muted); }
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">⬡ TradingBot</span>

  <div class="btn-group" id="symbol-btns">
    <button data-sym="BTC-PERP" class="active">BTC</button>
    <button data-sym="SOL-PERP">SOL</button>
    <button data-sym="BTCSOL">BTC/SOL</button>
  </div>

  <div class="btn-group" id="interval-btns">
    <button data-iv="1d">1D</button>
    <button data-iv="4h">4H</button>
    <button data-iv="1h">1H</button>
    <button data-iv="30m">30M</button>
    <button data-iv="15m">15M</button>
    <button data-iv="5m">5M</button>
    <button data-iv="1m" class="active">1M</button>
  </div>

  <div class="btn-group" id="source-btns">
    <button data-src="live" class="active" style="color:#3fb950"><span class="live-dot active"></span>LIVE</button>
    <button data-src="local">LOCAL</button>
  </div>

  <!-- Indicator toggles -->
  <div style="display:flex;gap:4px;align-items:center;margin-left:4px;">
    <span style="color:var(--muted);font-size:10px;margin-right:2px">overlay:</span>
    <button class="ind-btn active" id="tog-ema">EMA</button>
    <button class="ind-btn active" id="tog-bb">BB</button>
    <button class="ind-btn active" id="tog-sig">Signals</button>
  </div>

  <div style="display:flex;gap:4px;align-items:center;">
    <span style="color:var(--muted);font-size:10px;">panel:</span>
    <button class="ind-btn active" id="tog-rsi">RSI</button>
  </div>

  <div id="price-display">
    <span class="price" id="cur-price">—</span>
    <span class="change" id="cur-change"></span>
  </div>
</div>

<div id="main">
  <div id="chart-wrap">
    <div id="chart-container">
      <div id="loading">Loading…</div>
      <div id="tooltip"></div>
    </div>
    <div id="volume-container"></div>
    <div id="indicator-container"></div>
  </div>

  <div id="sidebar">
    <!-- Markets -->
    <div>
      <h3>Markets</h3>
      <div id="market-cards"></div>
    </div>

    <!-- Signals -->
    <div>
      <h3>Signals</h3>
      <div id="signals-panel"><span style="color:var(--muted);font-size:11px">Loading…</span></div>
    </div>

    <!-- Pattern Engine -->
    <div>
      <h3>Patterns <span id="pattern-dot" style="font-size:8px;color:var(--muted)">●</span></h3>
      <div id="patterns-panel"><span style="color:var(--muted);font-size:10px">Loading…</span></div>
    </div>

    <!-- Risk -->
    <div>
      <h3>Risk</h3>
      <div style="display:flex;gap:4px;margin-bottom:6px;align-items:center">
        <span style="color:var(--muted);font-size:10px">Lev:</span>
        <input id="lev-input" type="number" value="1" min="1" max="20" step="0.5"
          style="width:50px;background:var(--bg);border:1px solid var(--border);color:var(--text);
                 border-radius:3px;padding:2px 5px;font-size:11px">
        <span style="color:var(--muted);font-size:10px">×</span>
        <button id="risk-btn" style="flex:1;padding:4px;background:var(--border);border:none;
          color:var(--text);border-radius:4px;cursor:pointer;font-size:11px">Assess ▶</button>
      </div>
      <div id="risk-panel"></div>
    </div>

    <!-- Scalper -->
    <div>
      <h3><span class="live-dot" id="scalper-dot"></span> Scalper</h3>
      <div id="scalper-panel" style="max-height:120px;overflow-y:auto">
        <span style="color:var(--muted);font-size:10px">Not running</span>
      </div>
    </div>

    <!-- Backtest -->
    <div>
      <h3>Backtest</h3>
      <button id="bt-btn">Run ▶</button>
      <div id="bt-panel"></div>
    </div>

    <!-- OHLCV stats -->
    <div>
      <h3>Last Bar</h3>
      <div class="stats">
        <div class="stat-row"><span class="stat-lbl">Open</span> <span class="stat-val" id="s-open">—</span></div>
        <div class="stat-row"><span class="stat-lbl">High</span> <span class="stat-val" id="s-high">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Low</span>  <span class="stat-val" id="s-low">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Close</span><span class="stat-val" id="s-close">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Vol</span>  <span class="stat-val" id="s-vol">—</span></div>
        <div class="stat-row"><span class="stat-lbl">Chg</span> <span class="stat-val" id="s-chg">—</span></div>
        <div class="stat-row"><span class="stat-lbl">RSI</span> <span class="stat-val" id="s-rsi">—</span></div>
        <div class="stat-row"><span class="stat-lbl">EMA12</span><span class="stat-val" id="s-ema12">—</span></div>
        <div class="stat-row"><span class="stat-lbl">EMA26</span><span class="stat-val" id="s-ema26">—</span></div>
      </div>
    </div>
  </div>
</div>

<div id="statusbar">
  <span><span class="ok">●</span>&nbsp;Connected</span>
  <span id="sb-symbol">—</span>
  <span id="sb-range">—</span>
  <span id="sb-updated">—</span>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = { symbol: 'SOL-PERP', interval: '1m', source: 'live' };
let mainChart, candleSeries, volChart, volSeries, rsiChart, rsiSeries, rsiOBSeries, rsiOSSeries;
let ema12Series, ema26Series, ema50Series, bbUpperSeries, bbMidSeries, bbLowerSeries;
let signalMarkers = [];
let showEMA = true, showBB = true, showSig = true, showRSI = true;

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = (n, d=2) => n == null || isNaN(n) ? '—' :
  Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtV = n => !n ? '—' : n>=1e6 ? fmt(n/1e6,2)+'M' : n>=1e3 ? fmt(n/1e3,2)+'K' : fmt(n,3);
const fmtDate = ts => new Date(ts*1000).toLocaleDateString('en-US',
  {month:'short',day:'numeric',year:'numeric',timeZone:'UTC'});
const dp = () => state.symbol === 'SOL-PERP' ? 3 : 2;

// ── Chart init ─────────────────────────────────────────────────────────────
function initCharts() {
  const shared = {
    layout:    {background:{color:'#0d1117'}, textColor:'#8b949e'},
    grid:      {vertLines:{color:'#21262d'}, horzLines:{color:'#21262d'}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Normal},
    timeScale: {borderColor:'#21262d', timeVisible:true, secondsVisible:false,
                fixLeftEdge:true},
    rightPriceScale: {borderColor:'#21262d'},
    handleScroll: true, handleScale: true,
  };

  const cEl = document.getElementById('chart-container');
  const vEl = document.getElementById('volume-container');
  const iEl = document.getElementById('indicator-container');

  mainChart = LightweightCharts.createChart(cEl, {...shared, width:cEl.clientWidth, height:cEl.clientHeight});

  candleSeries = mainChart.addCandlestickSeries({
    upColor:'#3fb950', downColor:'#f85149',
    borderUpColor:'#3fb950', borderDownColor:'#f85149',
    wickUpColor:'#3fb950', wickDownColor:'#f85149',
  });

  // EMA lines
  ema12Series = mainChart.addLineSeries({color:'#f0c040', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
  ema26Series = mainChart.addLineSeries({color:'#58a6ff', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
  ema50Series = mainChart.addLineSeries({color:'#8b949e', lineWidth:1, lineStyle:1, priceLineVisible:false, lastValueVisible:false});

  // Bollinger Bands
  bbUpperSeries = mainChart.addLineSeries({color:'#7f7f7f55', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
  bbMidSeries   = mainChart.addLineSeries({color:'#7f7f7f44', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false});
  bbLowerSeries = mainChart.addLineSeries({color:'#7f7f7f55', lineWidth:1, priceLineVisible:false, lastValueVisible:false});

  // Volume
  volChart = LightweightCharts.createChart(vEl, {...shared, width:vEl.clientWidth, height:vEl.clientHeight,
    timeScale:{...shared.timeScale, visible:false},
    rightPriceScale:{borderColor:'#21262d', scaleMargins:{top:0.1, bottom:0}}});
  volSeries = volChart.addHistogramSeries({color:'#58a6ff44', priceFormat:{type:'volume'}});

  // RSI panel
  rsiChart = LightweightCharts.createChart(iEl, {...shared, width:iEl.clientWidth, height:iEl.clientHeight,
    timeScale:{...shared.timeScale, visible:false},
    rightPriceScale:{borderColor:'#21262d', scaleMargins:{top:0.05, bottom:0.05}}});
  rsiSeries   = rsiChart.addLineSeries({color:'#c8a4f0', lineWidth:1.5, priceLineVisible:false, lastValueVisible:true});
  rsiOBSeries = rsiChart.addLineSeries({color:'#f8514944', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false});
  rsiOSSeries = rsiChart.addLineSeries({color:'#3fb95044', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false});

  // Time scale sync
  const sync = (a, ...rest) => {
    a.timeScale().subscribeVisibleLogicalRangeChange(r => {
      if (r) rest.forEach(c => c.timeScale().setVisibleLogicalRange(r));
    });
  };
  sync(mainChart, volChart, rsiChart);
  sync(volChart, mainChart, rsiChart);
  sync(rsiChart, mainChart, volChart);

  mainChart.subscribeCrosshairMove(onCrosshair);

  const ro = new ResizeObserver(() => {
    mainChart.applyOptions({width:cEl.clientWidth, height:cEl.clientHeight});
    volChart.applyOptions({width:vEl.clientWidth, height:vEl.clientHeight});
    rsiChart.applyOptions({width:iEl.clientWidth, height:iEl.clientHeight});
  });
  [cEl, vEl, iEl].forEach(e => ro.observe(e));
}

// ── Crosshair ──────────────────────────────────────────────────────────────
function onCrosshair(p) {
  const bar = p.seriesData?.get(candleSeries);
  const tip = document.getElementById('tooltip');
  if (!bar) { tip.innerHTML = ''; return; }
  const isUp = bar.close >= bar.open;
  const chg  = ((bar.close - bar.open) / bar.open * 100).toFixed(2);
  const col  = isUp ? '#3fb950' : '#f85149';
  const d    = dp();
  tip.innerHTML = `<div class="ohlc">
    <span>O <span style="color:#c8d1da">${fmt(bar.open,d)}</span></span>
    <span>H <span style="color:#3fb950">${fmt(bar.high,d)}</span></span>
    <span>L <span style="color:#f85149">${fmt(bar.low,d)}</span></span>
    <span>C <span style="color:${col};font-weight:600">${fmt(bar.close,d)}</span></span>
    <span style="color:${col}">${isUp?'+':''}${chg}%</span>
  </div>`;
  updateBarStats(bar);
}

function updateBarStats(bar) {
  const d = dp();
  document.getElementById('s-open').textContent  = fmt(bar.open, d);
  document.getElementById('s-high').textContent  = fmt(bar.high, d);
  document.getElementById('s-low').textContent   = fmt(bar.low, d);
  document.getElementById('s-close').textContent = fmt(bar.close, d);
  if (bar.volume !== undefined) document.getElementById('s-vol').textContent = fmtV(bar.volume);
  const chg = ((bar.close - bar.open) / bar.open * 100).toFixed(2);
  const el  = document.getElementById('s-chg');
  el.textContent = `${chg >= 0 ? '+' : ''}${chg}%`;
  el.style.color = chg >= 0 ? '#3fb950' : '#f85149';
}

// ── Load & render ──────────────────────────────────────────────────────────
async function render() {
  document.getElementById('loading').style.display = 'flex';
  try {
    let kData, iData;

    if (state.source === 'live') {
      // Fetch from Orderly live API
      const liveRes = await fetch(`/api/live/klines?symbol=${state.symbol}&interval=${state.interval}&limit=500`);
      const liveData = await liveRes.json();
      kData = { candles: liveData.candles || [] };
      iData = { data: [] }; // No indicators for live data (yet)
    } else {
      [kData, iData] = await Promise.all([
        fetch(`/api/klines?symbol=${state.symbol}&interval=${state.interval}&limit=500`).then(r=>r.json()),
        fetch(`/api/indicators?symbol=${state.symbol}&interval=${state.interval}&limit=500`).then(r=>r.json()),
      ]);
    }

    const candles = kData.candles || [];
    const indData = iData.data || [];
    if (!candles.length) return;

    // Candlesticks
    candleSeries.setData(candles);

    // Volume
    volSeries.setData(candles.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? '#3fb95055' : '#f8514955'
    })));

    // Indicators
    const toLine = (arr, key) => arr
      .filter(d => d[key] != null)
      .map(d => ({time: d.open_time, value: d[key]}));

    ema12Series.setData(toLine(indData, 'ema_12'));
    ema26Series.setData(toLine(indData, 'ema_26'));
    ema50Series.setData(toLine(indData, 'ema_50'));
    bbUpperSeries.setData(toLine(indData, 'bb_upper'));
    bbMidSeries.setData(toLine(indData, 'bb_mid'));
    bbLowerSeries.setData(toLine(indData, 'bb_lower'));

    // RSI
    const rsiData = indData.filter(d => d.rsi_14 != null).map(d => ({time:d.open_time, value:d.rsi_14}));
    rsiSeries.setData(rsiData);
    if (rsiData.length) {
      const span = {from: rsiData[0].time, to: rsiData[rsiData.length-1].time};
      rsiOBSeries.setData([{time:span.from, value:70},{time:span.to, value:70}]);
      rsiOSSeries.setData([{time:span.from, value:30},{time:span.to, value:30}]);
    }

    // Fit — only fit mainChart; vol + RSI sync from it via subscribeVisibleLogicalRangeChange.
    // rAF ensures the browser has painted all series data before we set the range,
    // avoiding the brief zoom-in to the first few candles on initial load.
    requestAnimationFrame(() => mainChart.timeScale().fitContent());

    // Price header
    const last  = candles[candles.length-1];
    const first = candles[0];
    const chg   = ((last.close - first.close) / first.close * 100).toFixed(2);
    const isUp  = parseFloat(chg) >= 0;
    document.getElementById('cur-price').textContent = fmt(last.close, dp());
    const chgEl = document.getElementById('cur-change');
    chgEl.textContent = `${isUp?'+':''}${chg}%`;
    chgEl.className   = 'change ' + (isUp ? 'up' : 'down');

    // Last bar stats
    updateBarStats(last);
    document.getElementById('s-vol').textContent = fmtV(last.volume);
    document.getElementById('s-cnt') && (document.getElementById('s-cnt').textContent = candles.length);

    // RSI in stats
    const lastInd = indData[indData.length-1];
    if (lastInd) {
      document.getElementById('s-rsi').textContent   = lastInd.rsi_14?.toFixed(1) ?? '—';
      document.getElementById('s-ema12').textContent = fmt(lastInd.ema_12, dp());
      document.getElementById('s-ema26').textContent = fmt(lastInd.ema_26, dp());
    }

    // Status bar
    document.getElementById('sb-symbol').textContent  = `${state.symbol} / ${state.interval}`;
    document.getElementById('sb-range').textContent   = `${fmtDate(first.time)} – ${fmtDate(last.time)}`;
    document.getElementById('sb-updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;

    // Apply overlay toggles
    applyToggles();

    // Load signals + markers
    loadSignals();

  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// ── Signals ────────────────────────────────────────────────────────────────
async function loadSignals() {
  try {
    const res  = await fetch(`/api/signals?symbol=${state.symbol}&interval=${state.interval}`);
    const data = await res.json();
    renderSignalsPanel(data.signals || []);

    // Fetch signal markers from backtest for chart annotation
    // For each active strategy targeting this symbol, show entry/exit markers
    await loadSignalMarkers();
  } catch(e) { console.error(e); }
}

async function loadSignalMarkers() {
  if (!showSig) { candleSeries.setMarkers([]); return; }

  // Run ema_cross backtest to get trade entries/exits for this symbol
  const strat = state.symbol === 'BTCSOL' ? 'ratio_zscore' : 'ema_cross';
  const sym   = state.symbol;
  try {
    const res  = await fetch(`/api/backtest?strategy=${strat}&symbol=${sym}&interval=${state.interval}`);
    const data = await res.json();
    const trades = data.trades || [];

    // Build markers — entries green up arrow, exits red down arrow
    const markers = [];
    // We need timestamps mapped to chart time (seconds)
    // The backtest trades have open_time from the DB (ms) or string dates
    // For now just show current live signal as a line marker on last bar
    const sigRes  = await fetch(`/api/signals?symbol=${sym}&interval=${state.interval}`);
    const sigData = await sigRes.json();
    const sigs    = (sigData.signals || []).filter(s => s.symbol === sym && s.direction !== 'FLAT');

    // Get last candle time
    const kRes = await fetch(`/api/klines?symbol=${sym}&interval=${state.interval}&limit=2`);
    const kData = await kRes.json();
    const lastCandle = (kData.candles||[]).slice(-1)[0];
    if (!lastCandle) return;

    for (const sig of sigs) {
      markers.push({
        time:     lastCandle.time,
        position: sig.direction === 'LONG' ? 'belowBar' : 'aboveBar',
        color:    sig.direction === 'LONG' ? '#3fb950' : '#f85149',
        shape:    sig.direction === 'LONG' ? 'arrowUp' : 'arrowDown',
        text:     `${sig.strategy}`,
        size:     1,
      });
    }

    markers.sort((a, b) => a.time - b.time);
    candleSeries.setMarkers(markers);
  } catch(e) { console.error(e); }
}

function renderSignalsPanel(signals) {
  const panel = document.getElementById('signals-panel');
  const mine  = signals.filter(s => s.symbol === state.symbol || s.symbol === 'BTCSOL');
  if (!mine.length) { panel.innerHTML = '<span style="color:var(--muted);font-size:11px">No signals</span>'; return; }

  panel.innerHTML = mine.map(s => {
    const pct = Math.round(s.strength * 100);
    return `<div class="sig-row ${s.direction}">
      <div class="sig-top">
        <span class="sig-name">${s.strategy}</span>
        <span class="sig-dir ${s.direction}">${
          s.direction === 'LONG' ? '▲ LONG' : s.direction === 'SHORT' ? '▼ SHORT' : '● FLAT'
        }</span>
      </div>
      <div class="sig-bar"><div class="sig-bar-fill ${s.direction}" style="width:${pct}%"></div></div>
      <div class="sig-reason">${s.reason}</div>
    </div>`;
  }).join('');
}

// ── Backtest panel ─────────────────────────────────────────────────────────
document.getElementById('bt-btn').addEventListener('click', async () => {
  const btn = document.getElementById('bt-btn');
  btn.textContent = 'Running…';
  btn.disabled = true;

    const strat = state.symbol === 'BTCSOL' ? 'ratio_zscore' :
                  state.symbol === 'SOL-PERP' ? 'rsi_mean_rev' : 'ema_cross';

      <div class="bt-metric"><span class="bt-lbl">Total return</span><span class="bt-val ${c(m.total_return)}">${m.total_return > 0 ? '+' : ''}${m.total_return}%</span></div>
      <div class="bt-metric"><span class="bt-lbl">vs B&amp;H</span><span class="bt-val">${m.bh_return > 0 ? '+' : ''}${m.bh_return}%</span></div>

      <div class="bt-metric"><span class="bt-lbl">Sharpe</span><span class="bt-val ${c(m.sharpe)}">${m.sharpe}</span></div>
      <div class="bt-metric"><span class="bt-lbl">Max DD</span><span class="bt-val neg">${m.max_drawdown}%</span></div>

      <div class="bt-metric"><span class="bt-lbl">Profit factor</span><span class="bt-val ${c(m.profit_factor - 1)}">${m.profit_factor}</span></div>

// ── Market cards ───────────────────────────────────────────────────────────
async function loadMarketCards() {
  try {
    const res  = await fetch('/api/latest');
    const data = await res.json();
    const seen = {};
    for (const p of data.prices) {
      if (!seen[p.symbol] || p.interval === '1d') seen[p.symbol] = p;
    }
    const container = document.getElementById('market-cards');
    container.innerHTML = '';
    for (const sym of ['BTC-PERP','SOL-PERP','BTCSOL']) {
      const p = seen[sym]; if (!p) continue;
      const d = sym === 'SOL-PERP' ? 3 : 2;
      const card = document.createElement('div');
      card.className = 'price-card' + (sym === state.symbol ? ' active' : '');
      card.dataset.sym = sym;
      card.innerHTML = `<div class="sym">${sym.replace('-PERP','')}</div>
        <div class="prc">${fmt(p.close, d)}</div>`;
      card.addEventListener('click', () => {
        state.symbol = sym;
        document.querySelectorAll('#symbol-btns button').forEach(b =>
          b.classList.toggle('active', b.dataset.sym === sym));
        document.querySelectorAll('.price-card').forEach(c =>
          c.classList.toggle('active', c.dataset.sym === sym));
        render();
      });
      container.appendChild(card);
    }
  } catch(e) {}
}

// ── Toggle overlays ────────────────────────────────────────────────────────
function applyToggles() {
  const hide = s => s.applyOptions({visible: false});
  const show = s => s.applyOptions({visible: true});
  if (showEMA) { show(ema12Series); show(ema26Series); show(ema50Series); }
  else         { hide(ema12Series); hide(ema26Series); hide(ema50Series); }
  if (showBB)  { show(bbUpperSeries); show(bbMidSeries); show(bbLowerSeries); }
  else         { hide(bbUpperSeries); hide(bbMidSeries); hide(bbLowerSeries); }
  document.getElementById('indicator-container').style.display = showRSI ? '' : 'none';
  if (showRSI) rsiChart.applyOptions({width: document.getElementById('indicator-container').clientWidth});
}

['ema','bb','sig','rsi'].forEach(k => {
  document.getElementById(`tog-${k}`).addEventListener('click', function() {
    if (k === 'ema') showEMA = !showEMA;
    if (k === 'bb')  showBB  = !showBB;
    if (k === 'sig') { showSig = !showSig; loadSignalMarkers(); }
    if (k === 'rsi') showRSI = !showRSI;
    this.classList.toggle('active');
    applyToggles();
  });
});

document.querySelectorAll('#symbol-btns button').forEach(btn => {

document.querySelectorAll('#interval-btns button').forEach(btn => {

  });
});

      <div class="risk-row"><span class="risk-lbl">ATRs to liq</span><span class="risk-val" style="color:${d.atr_to_liq<2?'#f85149':d.atr_to_liq<4?'#f0c040':'#3fb950'}">${d.atr_to_liq}×</span></div>

// ── Scalper status polling ─────────────────────────────────────────────
async function pollScalper() {
  try {
    const res = await fetch('/api/live/scalper');
    const data = await res.json();
    const panel = document.getElementById('scalper-panel');
    const dot   = document.getElementById('scalper-dot');

    if (data.running && data.lines.length) {
      dot.classList.add('active');
      panel.innerHTML = data.lines.slice(-8).map(line => {
        let cls = 'scalper-line';
        if (line.includes('OPENING') || line.includes('CLOSING')) cls += ' trade';
        if (line.includes('🟢')) cls += ' win';
        if (line.includes('🔴')) cls += ' loss';
        const short = line.replace(/^\d{4}-\d{2}-\d{2} /, '');
        return `<div class="${cls}" title="${line}">${short}</div>`;
      }).join('');
      panel.scrollTop = panel.scrollHeight;
    } else {
      dot.classList.remove('active');
      panel.innerHTML = '<span style="color:var(--muted);font-size:10px">Not running</span>';
    }
  } catch(e) {}
}

// ── Live price update (header) ─────────────────────────────────────────
async function pollLivePrice() {
  if (state.source !== 'live') return;
  try {
    const res = await fetch(`/api/live/price?symbol=${state.symbol}`);
    const data = await res.json();
    if (data.price) {
      document.getElementById('cur-price').textContent = fmt(data.price, dp());
    }
  } catch(e) {}
}

// ── Pattern Engine ─────────────────────────────────────────────────────────
const ALL_PATTERNS = [
  "VelocityBurst", "CompressionBreakout", "TrendPullback",
  "MeanReversion", "OrderFlowPressure", "MultitimeframeAlignment",
];
const PATTERN_LABELS = {
  VelocityBurst:          "Velocity",
  CompressionBreakout:    "Compression",
  TrendPullback:          "Trend PB",
  MeanReversion:          "MeanRev",
  OrderFlowPressure:      "OrderFlow",
  MultitimeframeAlignment:"MTF Align",
};

async function pollPatterns() {
  const panel = document.getElementById('patterns-panel');
  const dot   = document.getElementById('pattern-dot');
  try {
    const res  = await fetch(`/api/live/patterns?symbol=${state.symbol}`);
    if (!res.ok) {
      dot.style.color = '#f85149';
      panel.innerHTML = `<span style="color:var(--muted);font-size:10px">Unavailable</span>`;
      return;
    }
    const data = await res.json();
    const comp = data.composite;
    const sigs = data.signals || [];
    const sigMap = {};
    for (const s of sigs) sigMap[s.name] = s;

    // Direction labels & icons
    const dirIcon = {BUY:'▲', SELL:'▼', NEUTRAL:'●'}[comp.direction] || '●';
    const dirLabel = comp.direction === 'BUY' ? 'LONG' : comp.direction === 'SELL' ? 'SHORT' : 'FLAT';
    const confPct  = Math.round(comp.confidence * 100);
    const consPct  = Math.round(comp.consensus  * 100);
    const wrPct    = Math.round(comp.win_rate_weighted * 100);
    const nActive  = comp.active_patterns.length;

    dot.style.color = comp.direction === 'BUY' ? '#3fb950'
                    : comp.direction === 'SELL' ? '#f85149' : '#8b949e';

    // Composite card
    let html = `
      <div class="pattern-composite ${comp.direction}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="pcomp-dir ${comp.direction}">${dirIcon} ${dirLabel}</span>
          <span style="font-size:10px;color:var(--muted)">${nActive}/${ALL_PATTERNS.length} active</span>
        </div>
        <div class="pcomp-bar"><div class="pcomp-fill ${comp.direction}" style="width:${confPct}%"></div></div>
        <div class="pcomp-stats">
          <div class="pcomp-stat">Conf <span>${confPct}%</span></div>
          <div class="pcomp-stat">Consensus <span>${consPct}%</span></div>
          <div class="pcomp-stat">WR <span>${wrPct}%</span></div>
        </div>
      </div>`;

    // Individual pattern rows
    for (const name of ALL_PATTERNS) {
      const sig    = sigMap[name];
      const isActive = !!sig;
      const dir    = sig ? sig.direction : 'NEUTRAL';
      const conf   = sig ? Math.round(sig.raw_confidence * 100) : 0;
      const wr     = sig ? Math.round(sig.win_rate * 100) : null;
      const dirIcon2 = dir === 'BUY' ? '▲' : dir === 'SELL' ? '▼' : '—';
      const wrStr  = wr !== null ? `WR ${wr}%` : '';
      html += `
        <div class="pattern-row ${isActive ? 'active' : ''} ${isActive ? dir : ''}">
          <div class="pat-top">
            <span class="pat-name ${isActive ? 'active' : ''}">${PATTERN_LABELS[name] || name}</span>
            <div class="pat-right">
              <span class="pat-wr">${wrStr}</span>
              <span class="pat-dir ${dir}">${isActive ? dirIcon2 + ' ' + dir : '—'}</span>
            </div>
          </div>
          ${isActive ? `<div class="pat-bar"><div class="pat-bar-fill ${dir}" style="width:${conf}%"></div></div>` : ''}
        </div>`;
    }

    panel.innerHTML = html;
  } catch(e) {
    dot.style.color = '#f85149';
    console.error('Pattern poll error:', e);
  }
}
